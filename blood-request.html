<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blood Request Portal</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body{
            background: linear-gradient(rgba(255,255,255,0.7),
                        rgba(255,255,255,0.7)),
                        url("backgroundimage.jpg");
            background-size:cover;
            background-position:center;
            min-height:100vh;
        }

        header{
            background:#c62828;
            color:white;
            padding:20px;
            text-align:center;
            box-shadow:0 4px 10px rgba(0,0,0,0.2);
        }

        nav{
            margin-top:10px;
        }

        nav a{
            color:white;
            text-decoration:none;
            margin:0 10px;
            padding:8px 15px;
            border-radius:5px;
            transition:0.3s;
        }

        nav a:hover{
            background:white;
            color:#c62828;
        }

        .container{
            display:flex;
            justify-content:center;
            align-items:center;
            padding:50px 20px;
        }

        .request-card{
            background:white;
            width:100%;
            max-width:500px;
            padding:30px;
            border-radius:20px;
            box-shadow:0 8px 25px rgba(0,0,0,0.2);
        }

        .request-card h2{
            text-align:center;
            color:#c62828;
            margin-bottom:25px;
        }

        label{
            display:block;
            margin-top:15px;
            font-weight:bold;
        }

        input,
        select{
            width:100%;
            padding:12px;
            margin-top:8px;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:16px;
        }

        input:focus,
        select:focus{
            outline:none;
            border-color:#c62828;
            box-shadow:0 0 8px rgba(198,40,40,0.3);
        }

        button{
            width:100%;
            margin-top:25px;
            padding:12px;
            background:#c62828;
            color:white;
            border:none;
            border-radius:8px;
            font-size:18px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#a81f1f;
            transform:translateY(-2px);
        }

        .info{
            text-align:center;
            margin-bottom:20px;
            color:#555;
        }

        footer{
            text-align:center;
            background:#c62828;
            color:white;
            padding:15px;
            margin-top:30px;
        }

        @media(max-width:600px){
            .request-card{
                padding:20px;
            }

            nav a{
                display:block;
                margin:8px 0;
            }
        }
    </style>
</head>
<body>

<header>
    <h1>🩸 Blood Request Portal</h1>

    <nav>
        <a href="index.html">Home</a>
        <a href="donate-blood.html">Donate Blood</a>
        <a href="blood-details.html">Blood Details</a>
    </nav>
</header>

<div class="container">
    <div class="request-card">

        <h2>Request Blood</h2>

        <p class="info">
            Fill in the details below to request blood from available donors.
        </p>

        <form id="bloodRequestForm">

            <label for="name">👤 Full Name</label>
            <input
                type="text"
                id="name"
                placeholder="Enter your full name"
                required
            >

            <label for="bloodType">🩸 Blood Group Needed</label>
            <select id="bloodType" required>
                <option value="">Select Blood Group</option>
                <option>A+</option>
                <option>A-</option>
                <option>B+</option>
                <option>B-</option>
                <option>AB+</option>
                <option>AB-</option>
                <option>O+</option>
                <option>O-</option>
            </select>

            <label for="contact">📞 Contact Number</label>
            <input
                type="tel"
                id="contact"
                placeholder="Enter mobile number"
                required
            >

            <button type="submit">
                Request Blood
            </button>

        </form>

    </div>
</div>

<footer>
    <p>❤️ Donate Blood, Save Lives ❤️</p>
</footer>

<script>
document.getElementById("bloodRequestForm")
.addEventListener("submit", function(event){

    event.preventDefault();

    alert(
        "Your blood request has been submitted successfully!"
    );

    this.reset();
});
</script>

</body>
</html>
